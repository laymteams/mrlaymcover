<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrLaym | Official Site</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">Mr<span>Laym</span></div>
        <nav>
            <a href="#release">Релиз</a>
            <a href="#covers">Каверы</a>
            <a href="#social">Связь</a>
        </nav>
    </header>

    <main>
        <section id="release" class="hero">
            <div class="hero-bg"></div>
            <div class="content-wrapper">
                <div class="release-info">
                    <span class="label">Single No. 1</span>
                    <h1 class="glitch" data-text="TNT (Dinamit)">TNT (Dinamit)</h1>
                    <p class="sub-text">Готовься к детонации. Релиз 1 апреля в 12:00.</p>
                    
                    <div id="timer" class="countdown">
                        <div class="t-item"><span id="days">00</span><label>дней</label></div>
                        <div class="t-item"><span id="hours">00</span><label>часов</label></div>
                        <div class="t-item"><span id="mins">00</span><label>минут</label></div>
                        <div class="t-item"><span id="secs">00</span><label>секунд</label></div>
                    </div>

                    <a href="#" class="main-btn">Pre-Save Now</a>
                </div>
                <div class="tnt-art">
                    <div class="art-circle"></div>
                    <div class="tnt-text">TNT</div>
                </div>
            </div>
        </section>

        <section id="covers" class="covers">
            <h2 class="title">Мои <span>Каверы</span></h2>
            <div class="grid">
                <div class="card">
                    <div class="card-img" style="background-image: url('https://via.placeholder.com/400x400/111/32CD32?text=Cover+1');"></div>
                    <div class="card-body">
                        <h3>Название кавера</h3>
                        <p>Оригинал: Исполнитель</p>
                        <button class="play-btn">Слушать</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-img" style="background-image: url('https://via.placeholder.com/400x400/111/32CD32?text=Cover+2');"></div>
                    <div class="card-body">
                        <h3>Название кавера</h3>
                        <p>Оригинал: Исполнитель</p>
                        <button class="play-btn">Слушать</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="social">
        <p>&copy; 2026 MrLaym. Сделано с драйвом.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
