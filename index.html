<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrLaym</title>

    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --lime: #32CD32;
            --black: #080808;
            --red: #ff3333;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-x: hidden;
            text-align: center;
        }

        /* Фоновое свечение */
        .glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 20%, rgba(50, 205, 50, 0.12) 0%, transparent 75%);
            z-index: -1;
        }

        header {
            width: 100%;
            padding: 40px 20px 0;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 5px;
        }

        .logo span { color: var(--lime); text-shadow: 0 0 20px var(--lime); }

        .container { width: 100%; max-width: 900px; padding: 20px; z-index: 1; margin: 0 auto; }

        .main-title {
            font-size: clamp(3rem, 12vw, 7rem);
            line-height: 0.9;
            margin-bottom: 40px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .main-title span {
            color: transparent;
            -webkit-text-stroke: 1px var(--lime);
        }

        .bomb {
            font-size: 5rem;
            margin-bottom: 20px;
            display: block;
            animation: shake 0.5s infinite alternate;
        }

        @keyframes shake {
            from { transform: scale(1) rotate(-5deg); }
            to { transform: scale(1.1) rotate(5deg); }
        }

        /* ТАЙМЕР */
        .timer-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .t-unit {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--lime);
            padding: 20px;
            min-width: 100px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(50, 205, 50, 0.2);
        }

        .t-unit span {
            display: block;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--lime);
        }

        .t-unit p { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; margin-top: 5px; }

        .status {
            color: var(--red);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* СТРАНИЦА РЕЛИЗА / ТРЕКЛИСТ */
        #release {
            width: 100%;
            padding-bottom: 60px;
            animation: boom 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }

        @keyframes boom {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .release-head { margin-bottom: 30px; }

        .release-head h2 {
            color: var(--lime);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .release-head h1 {
            font-size: clamp(2.2rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
        }

        .tracklist {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .track-card {
            background: #111;
            border: 2px solid rgba(50, 205, 50, 0.4);
            border-radius: 20px;
            padding: 25px 30px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .track-card:hover,
        .track-card.playing {
            border-color: var(--lime);
            box-shadow: 0 0 35px rgba(50, 205, 50, 0.25);
        }

        .track-top {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 16px;
        }

        .track-num {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.1rem;
            color: var(--lime);
            border: 2px solid var(--lime);
            border-radius: 10px;
            width: 42px;
            height: 42px;
            min-width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-info h3 {
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .track-info p {
            font-size: 0.75rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        audio {
            width: 100%;
            display: block;
            filter: invert(1) hue-rotate(90deg) brightness(1.5);
        }

        .release-footer {
            margin-top: 35px;
            opacity: 0.5;
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .track-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <div class="logo">MR<span>LAYM</span></div>
    </header>

    <main class="container">
        <div id="waiting">
            <span class="bomb">🧨</span>
            <h1 class="main-title">TNT <br><span>DINAMIT</span></h1>

            <div class="timer-grid">
                <div class="t-unit"><span id="d">00</span><p>дней</p></div>
                <div class="t-unit"><span id="h">00</span><p>часов</p></div>
                <div class="t-unit"><span id="m">00</span><p>минут</p></div>
                <div class="t-unit"><span id="s">00</span><p>секунд</p></div>
            </div>

            <p class="status">Объект заминирован. Детонация 1 апреля в 12:00</p>
        </div>

        <div id="release" class="hidden"></div>
    </main>

    <script>
        // ДАТА: 1 апреля 2026, 12:00
        const target = new Date("April 1, 2026 12:00:00").getTime();

        // ТРЕКИ
        const tracks = [
            {
                title: "Кто командует шоу",
                subtitle: "Сделано с любовью и в рамках закона конечно же)",
                src: "BandLabSong.mp3"
            },
            {
                title: "TNT (Dinamit)",
                subtitle: "С первым апреля! Слушай на всю катушку. ПЕРЕСТАНЕТ БЫТЬ ДОСТУПНО С АВГУСТА!",
                src: "sPervimAprely.mp3"
            }
        ];

        function update() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                showRelease();
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("d").innerText = days.toString().padStart(2, '0');
            document.getElementById("h").innerText = hours.toString().padStart(2, '0');
            document.getElementById("m").innerText = mins.toString().padStart(2, '0');
            document.getElementById("s").innerText = secs.toString().padStart(2, '0');
        }

        function buildTrackCard(track, index) {
            const num = (index + 1).toString().padStart(2, '0');
            return `
                <div class="track-card" id="card-${index}">
                    <div class="track-top">
                        <div class="track-num">${num}</div>
                        <div class="track-info">
                            <h3>${track.title}</h3>
                            <p>${track.subtitle}</p>
                        </div>
                    </div>
                    <audio controls preload="none" data-index="${index}">
                        <source src="${track.src}" type="audio/mpeg">
                    </audio>
                </div>
            `;
        }

        function showRelease() {
            const waitBox = document.getElementById("waiting");
            const releaseBox = document.getElementById("release");

            if (!waitBox.classList.contains("hidden")) {
                waitBox.classList.add("hidden");

                const cardsHtml = tracks.map(buildTrackCard).join("");

                releaseBox.innerHTML = `
                    <div class="release-head">
                        <h1>Все треки</h1>
                    </div>
                    <div class="tracklist">
                        ${cardsHtml}
                    </div>
                    <p class="release-footer">Слушай на всю катушку.</p>
                `;
                releaseBox.classList.remove("hidden");

                // Подсветка карточки при воспроизведении + автопауза остальных
                const audios = releaseBox.querySelectorAll("audio");
                audios.forEach(a => {
                    a.addEventListener("play", () => {
                        audios.forEach(other => {
                            if (other !== a) other.pause();
                        });
                        document.querySelectorAll(".track-card").forEach(c => c.classList.remove("playing"));
                        document.getElementById(`card-${a.dataset.index}`).classList.add("playing");
                    });
                });

            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
