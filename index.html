<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrLaym | TNT (Dinamit)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="overlay"></div>

    <header>
        <div class="logo">MR<span>LAYM</span></div>
    </header>

    <main class="container">
        <div id="timer-screen" class="active-screen">
            <div class="bomb-icon">🧨</div>
            <h1 class="main-title">TNT <br><span>DINAMIT</span></h1>
            <div class="timer-grid">
                <div class="t-unit"><span id="days">00</span><p>дней</p></div>
                <div class="t-unit"><span id="hours">00</span><p>часов</p></div>
                <div class="t-unit"><span id="mins">00</span><p>минут</p></div>
                <div class="t-unit"><span id="secs">00</span><p>секунд</p></div>
            </div>
            <p class="status-text">ОБЪЕКТ ЗАМИНИРОВАН. ДЕТОНАЦИЯ 1 АПРЕЛЯ В 12:00</p>
        </div>

        <div id="release-screen" class="hidden"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
